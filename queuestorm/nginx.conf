# QueueStorm — nginx site configs (HTTP + HTTPS)
# Loaded by deploy.sh into /etc/nginx/sites-available/queuestorm (HTTP)
# and /etc/nginx/sites-available/queuestorm-ssl (HTTPS)
# Proxies public 80/443 -> 127.0.0.1:8000 (FastAPI/uvicorn, systemd-managed).
#
# For manual (non-deploy.sh) install:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/queuestorm
#   2. sudo ln -s /etc/nginx/sites-available/queuestorm /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d ticket.brlikhon.engineer
#   4. sudo systemctl reload nginx
#
# The deploy.sh script writes a more complete version with shared SSL params
# (Mozilla intermediate profile, HSTS, OCSP stapling, DH params).

# --- HTTP: ACME challenge + redirect everything else to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name ticket.brlikhon.engineer;

    # ACME http-01 challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all non-ACME traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: TLS-terminated reverse proxy ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ticket.brlikhon.engineer;

    # Certificates managed by certbot
    ssl_certificate     /etc/letsencrypt/live/ticket.brlikhon.engineer/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ticket.brlikhon.engineer/privkey.pem;

    # Modern TLS only (TLS 1.2 + 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # Session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # DH params for PFS (generate once: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    ssl_dhparam /etc/nginx/dhparam.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Reverse proxy to FastAPI/uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # LLM calls can take up to ~25s; keep gateway timeouts generous
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Reasonable body size cap (prevents abuse; tickets are small)
        client_max_body_size 1m;

        # Cache-bust API responses
        add_header Cache-Control "no-store" always;
    }
}
